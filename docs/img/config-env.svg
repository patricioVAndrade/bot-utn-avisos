<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Vista previa .env">
  <rect width="1200" height="700" fill="#0f172a"/>
  <rect x="80" y="70" width="1040" height="560" rx="20" fill="#111827"/>
  <text x="120" y="130" fill="#e5e7eb" font-size="30" font-family="Consolas, monospace" font-weight="700">.env (ejemplo sin datos reales)</text>
  <rect x="120" y="170" width="960" height="410" rx="14" fill="#0b1220" stroke="#1f2937"/>
