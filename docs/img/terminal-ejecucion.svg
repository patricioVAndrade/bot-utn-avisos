  <rect width="1200" height="700" fill="#0b1021"/>
  <rect x="70" y="70" width="1060" height="560" rx="20" fill="#111827"/>
  <rect x="70" y="70" width="1060" height="60" rx="20" fill="#1f2937"/>
  <circle cx="110" cy="100" r="8" fill="#ef4444"/>
  <circle cx="138" cy="100" r="8" fill="#f59e0b"/>
  <circle cx="166" cy="100" r="8" fill="#10b981"/>
  <text x="210" y="107" fill="#e5e7eb" font-size="24" font-family="Consolas, monospace">PowerShell - ejecucion del script</text>
